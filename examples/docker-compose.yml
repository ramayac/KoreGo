version: "3.8"

# GoPOSIX sidecar example.
# The daemon container listens on a shared Unix socket and the client
# container exercises it with a quick smoke script.
#
# Usage:
#   docker compose -f examples/docker-compose.yml up --build
#   docker compose -f examples/docker-compose.yml down

services:
  goposix:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: goposix:latest
    command: goposix daemon -s /var/run/goposix/goposix.sock -w 4
    user: "65534:65534"
    read_only: true
    volumes:
      - goposix-socket:/var/run/goposix
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "echo '{\"jsonrpc\":\"2.0\",\"method\":\"goposix.ping\",\"id\":1}' | nc -U /var/run/goposix/goposix.sock",
        ]
      interval: 10s
      timeout: 3s
      retries: 3

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.debug
    image: goposix:debug
    command: |
      sh -c '
        echo "--- waiting for daemon ---"
        sleep 2
        echo "--- ping ---"
        echo "{\"jsonrpc\":\"2.0\",\"method\":\"goposix.ping\",\"id\":1}" | nc -U /var/run/goposix/goposix.sock
        echo ""
        echo "--- echo ---"
        echo "{\"jsonrpc\":\"2.0\",\"method\":\"goposix.echo\",\"params\":{\"text\":\"hello from compose\"},\"id\":2}" | nc -U /var/run/goposix/goposix.sock
        echo ""
        echo "--- ls /etc ---"
        echo "{\"jsonrpc\":\"2.0\",\"method\":\"goposix.ls\",\"params\":{\"path\":\"/etc\"},\"id\":3}" | nc -U /var/run/goposix/goposix.sock
        echo ""
        echo "--- done ---"
      '
    depends_on:
      goposix:
        condition: service_healthy
    volumes:
      - goposix-socket:/var/run/goposix

volumes:
  goposix-socket:
