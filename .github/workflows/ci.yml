name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint → Test → Docker build → Smoke tests
  # ---------------------------------------------------------------------------
  test:
    name: Lint / Test / Docker smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe --tags

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: make vet

      - name: Unit tests
        run: make test

      - name: Coverage check
        run: |
          CGO_ENABLED=0 go test -coverprofile=coverage.out $(go list ./pkg/... ./internal/... | grep -v /cmd/)
          COVERED=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Overall coverage: ${COVERED}%"
          if (( $(echo "$COVERED < 50" | bc -l) )); then
            echo "::warning::Coverage ${COVERED}% is below 50% threshold"
          fi

      - name: Compliance tests
        run: make compliance

      - name: Build binary
        run: make build

      - name: Verify --list-commands
        run: ./korego --list-commands

      - name: Validate JSON schemas
        run: make validate-schemas

      - name: Build Docker image
        run: make docker

      - name: Smoke tests (in container)
        run: make smoke

      - name: Run BusyBox Test Suite
        run: |
          echo "Running BusyBox test suite..."
          make testsuite > testsuite.log 2>&1 || true
          PASS=$(grep -c "^PASS:" testsuite.log || true)
          FAIL=$(grep -c "^FAIL:" testsuite.log || true)
          SKIPPED=$(grep -c "^SKIPPED:" testsuite.log || true)
          TOTAL=$((PASS + FAIL))
          if [ $TOTAL -eq 0 ]; then
            echo "::warning::No tests executed or output format changed."
            cat testsuite.log
            exit 0
          fi
          PERCENT=$((PASS * 100 / TOTAL))
          echo "::notice::BusyBox Test Suite: ${PERCENT}% pass rate (${PASS} passed, ${FAIL} failed, ${SKIPPED} skipped)"
          if [ $FAIL -gt 0 ]; then
            echo "--- Failures ---"
            grep "^FAIL:" testsuite.log || true
          fi
          if [ $PASS -lt 479 ]; then
            echo "::error::BusyBox pass count ($PASS) dropped below baseline (479)"
            exit 1
          fi
  # ---------------------------------------------------------------------------
  # Job 2: Image size gate — must be < 20 MB
  # ---------------------------------------------------------------------------
  image-size:
    name: Image size gate (<20 MB)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image (multi-arch test)
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          docker buildx build --platform linux/amd64,linux/arm64 -t korego:${VERSION} -f docker/Dockerfile .

      - name: Check image size (amd64)
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          docker buildx build --platform linux/amd64 --load -t korego:${VERSION} -f docker/Dockerfile .
          SIZE=$(docker image inspect "korego:${VERSION}" --format '{{.Size}}')
          MB=$(( SIZE / 1024 / 1024 ))
          echo "Image size: ${MB} MB (${SIZE} bytes)"
          if [ "${SIZE}" -gt 20971520 ]; then
            echo "::error::Image size ${MB} MB exceeds 20 MB limit"
            exit 1
          else
            echo "PASS: image size ${MB} MB is within the 20 MB target"
          fi
